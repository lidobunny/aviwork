<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LidoBunny's Avatar Work</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f9f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 5rem 2rem 4rem;
      overflow: hidden;
      background: #111;
      color: #fff;
    }

    .header-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }

    header .header-content {
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    header p {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: rgba(255,255,255,0.72);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 3.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── THUMBNAIL ── */
    .thumb {
      display: block;
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      background: #e8e5e0;
      aspect-ratio: 1 / 1;
      border: 1.5px solid rgba(0,0,0,0.07);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .thumb:hover {
      transform: translateY(-3px);
      border-color: rgba(0,0,0,0.18);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .lightbox.open { display: flex; }

    .lb-inner {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      max-width: min(95vw, 1100px);
      max-height: 90vh;
      cursor: default;
    }

    /* ── INFO PANEL (left) ── */
    .lb-panel {
      flex: 0 0 240px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 1.5rem 1.25rem;
      color: #fff;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .lb-panel h2 {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
    }

    .lb-panel p {
      font-size: 0.88rem;
      line-height: 1.65;
      color: rgba(255,255,255,0.72);
    }

    /* ── IMAGE (right) ── */
    .lb-img-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .lb-img-wrap img {
      max-width: 100%;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    /* on narrow screens stack vertically */
    @media (max-width: 700px) {
      .lb-inner { flex-direction: column-reverse; align-items: center; }
      .lb-panel  { flex: 0 0 auto; width: 100%; max-width: 480px; align-self: auto; }
    }

    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
      z-index: 1;
    }

    .lightbox-close:hover { color: #fff; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.75rem 2rem;
      font-size: 0.82rem;
      color: #888;
      border-top: 1px solid rgba(0,0,0,0.08);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <!--
      BACKGROUND OPTIONS — pick one and delete the other:

      OPTION A — video:
        <video class="header-bg" autoplay muted loop playsinline>
          <source src="your-background.mp4" type="video/mp4" />
        </video>

      OPTION B — animated GIF:
        <img class="header-bg" src="your-background.gif" alt="" />

    <video class="header-bg" autoplay muted loop playsinline>
      <source src="supidodtled.mp4" type="video/mp4" />

    <div class="header-content">
      <h1>LidoBunny's Avatar Work</h1>

  <!-- ══ GALLERY ══ -->

      <a class="thumb" href="02.png"
         data-title="Kompressor"
         data-desc="Client supplied ref sheet! I worked up every detail in Substance Painter from an empty project. I baked mesh maps, set up emission masks for the stripes, enabled audiolink for those emissions. I used Krita to make custom Substance brushes to match the source material. I modeled and textured low-poly tail accessories and weight painted them to her tail so that each one moved with the tail, but none of them stretched or deformed. I applied lots of add-ons and accessories that she found online, and re-unwrapped and textured her hair. I set up a custom eye shader so she could have the pupil straight from her ref sheet, and an animated kaleidoscope effect in the iris. Her version of this base had extra blend shapes that the add-on clothes weren't designed for, so I added new blend shapes to that clothing and new blend shapes to the body to prevent clipping. This one was so much fun!">
        <img src="02.png" alt="Avatar example 2" />
      </a>

      <a class="thumb" href="images/03.jpg"

      <a class="thumb" href="images/06.jpg"

    </div>
  </main>

  <!-- ══ FOOTER ══ -->
  <footer>
    &copy; 2026 all paws reserved
  </footer>

  <!-- ══ LIGHTBOX ══ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Full size image">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <div class="lb-inner">
      <div class="lb-panel">
        <h2 id="lb-title"></h2>
        <p id="lb-desc"></p>
      </div>
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="Full size preview" />
      </div>
    </div>
  </div>

  <script>
    const gallery  = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbTitle  = document.getElementById('lb-title');
    const lbDesc   = document.getElementById('lb-desc');
    const lbClose  = document.getElementById('lb-close');

    function openLightbox(src, alt, title, desc) {
      lbImg.src    = src;
      lbImg.alt    = alt;
      lbTitle.textContent = title || '';
      lbDesc.textContent  = desc  || '';
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    gallery.addEventListener('click', e => {
      const link = e.target.closest('.thumb');
      if (!link) return;
      e.preventDefault();
      const img = link.querySelector('img');
      openLightbox(
        link.href,
        img ? img.alt : '',
        link.dataset.title,
        link.dataset.desc
      );
    });

    lbClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
