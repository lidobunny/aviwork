<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LidoBunny's Avatar Work</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f9f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 5rem 2rem 4rem;
      overflow: hidden;
      background: #111;
      color: #fff;
    }

    /* Video / GIF background */
    .header-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }

    header .header-content {
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    header p {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: rgba(255,255,255,0.72);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 3.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── THUMBNAIL ── */
    .thumb {
      display: block;
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      background: #e8e5e0;
      aspect-ratio: 1 / 1;
      border: 1.5px solid rgba(0,0,0,0.07);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .thumb:hover {
      transform: translateY(-3px);
      border-color: rgba(0,0,0,0.18);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      cursor: zoom-out;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: min(90vw, 900px);
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }

    .lightbox-close:hover { color: #fff; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.75rem 2rem;
      font-size: 0.82rem;
      color: #888;
      border-top: 1px solid rgba(0,0,0,0.08);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <!--
      BACKGROUND OPTIONS — pick one and delete the other:

      OPTION A — video:
        <video class="header-bg" autoplay muted loop playsinline>
          <source src="your-background.mp4" type="video/mp4" />
        </video>

      OPTION B — animated GIF:
        <img class="header-bg" src="your-background.gif" alt="" />
    -->
    <video class="header-bg" autoplay muted loop playsinline>
      <source src="supidodtled.mp4" type="video/mp4" />
    </video>

    <div class="header-content">
      <h1>LidoBunny's Avatar Work</h1>
      <p>A centralized place to see examples, pricing, and contact info</p>
    </div>
  </header>

  <!-- ══ GALLERY ══ -->
  <main>
    <div class="grid" id="gallery">
      <!--
        Replace each src="images/01.jpg" with your real image filenames.
        Add or remove <a> blocks to match your image count.
        The href is the full-size version; the img src is the thumbnail
        (they can be the same file if you only have one copy).
      -->
      <a class="thumb" href="1.png"><img src="1.png" alt="Avatar example 1" /></a>
      <a class="thumb" href="images/02.jpg"><img src="images/02.jpg" alt="Avatar example 2" /></a>
      <a class="thumb" href="images/03.jpg"><img src="images/03.jpg" alt="Avatar example 3" /></a>
      <a class="thumb" href="images/04.jpg"><img src="images/04.jpg" alt="Avatar example 4" /></a>
      <a class="thumb" href="images/05.jpg"><img src="images/05.jpg" alt="Avatar example 5" /></a>
      <a class="thumb" href="images/06.jpg"><img src="images/06.jpg" alt="Avatar example 6" /></a>
      <a class="thumb" href="images/07.jpg"><img src="images/07.jpg" alt="Avatar example 7" /></a>
      <a class="thumb" href="images/08.jpg"><img src="images/08.jpg" alt="Avatar example 8" /></a>
      <a class="thumb" href="images/09.jpg"><img src="images/09.jpg" alt="Avatar example 9" /></a>
      <a class="thumb" href="images/10.jpg"><img src="images/10.jpg" alt="Avatar example 10" /></a>
      <a class="thumb" href="images/11.jpg"><img src="images/11.jpg" alt="Avatar example 11" /></a>
      <a class="thumb" href="images/12.jpg"><img src="images/12.jpg" alt="Avatar example 12" /></a>
    </div>
  </main>

  <!-- ══ FOOTER ══ -->
  <footer>
    &copy; 2026 all paws reserved
  </footer>

  <!-- ══ LIGHTBOX ══ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Full size image">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <img id="lb-img" src="" alt="Full size preview" />
  </div>

  <script>
    const gallery  = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbClose  = document.getElementById('lb-close');

    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    gallery.addEventListener('click', e => {
      const link = e.target.closest('.thumb');
      if (!link) return;
      e.preventDefault();
      const img = link.querySelector('img');
      openLightbox(link.href, img ? img.alt : '');
    });

    lbClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
